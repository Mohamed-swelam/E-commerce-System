<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <!-- bootstrap links -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"

    <link rel="stylesheet" href="./adminStyles.css">
</head>

<body>
    <!-- Start NavBar -->
    <section id="nav">
        <nav class="navbar navbar-expand-lg  bg-white px-3">
            <div class="container-fluid">
                <a class="navbar-brand" href="#">Avion</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                    aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse gap-5 " id="navbarNav">
                    <ul class="navbar-nav  ms-auto">
                        <li class="nav-item">
                            <a class="nav-link " href="#">About Us</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#">Contact</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#">Blog</a>
                        </li>
                        <li class="nav-item ">
                            <a class="nav-link active-nav" href="#">Dashboard</a>
                        </li>

                    </ul>


                    <ul class="list-unstyled d-flex gap-3 mt-3 ">
                        <li class="icon-il">
                            <a href="">
                                <i class="fa-solid fa-cart-shopping"></i>
                            </a>
                        </li>

                        <li class="icon-il">
                            <a href="">
                                <i class="fa-regular fa-circle-user"></i>
                            </a>
                        </li>
                    </ul>
                </div>


            </div>
        </nav>
        <nav class="bottom-bar   p-2">
            <div class="container-fluid">
                <div class="flex justify-content-center align-items-center">
                    <ul class=" d-flex  flex-nowrap justify-content-center list-unstyled align-items-center"
                        id="bottom-navbar">
                        <li>
                            <a class="nav-link " href="#"></a>
                        </li>
                        <li>
                            <a class="nav-link" href="#"></a>
                        </li>
                        <li>
                            <a class="nav-link" href="#"></a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </section>
    <!-- End NavBar -->



    <!-- Start of dashboard -->
    <div class="row w-100 m-auto justify-content-between" style="background-color: rgba(215, 215, 215, 0.482); ">
        <div
            class="col-12 col-md-2 p-2 py-md-5 fs-5 d-flex flex-row flex-md-column justify-content-between justify-content-md-start flex-wrap tabs-container">
            <p class="p-2 pe-md-0 rounded-3 main-tab active-tab">customers</p>
            <p class="p-2 pe-md-0 rounded-3 main-tab">sellers</p>
            <p class="p-2 pe-md-0 rounded-3 main-tab">products</p>
            <p class="p-2 pe-md-0 rounded-3 main-tab">account</p>
        </div>
        <div class="col-12 col-md-9 p-3" style="min-height: 100vh;">
            <div id="customers" class="sub-tab active-sub-tab"> this is from customers</div>
            <div id="sellers" class="sub-tab"> this is from sellers</div>
            <div id="products" class="sub-tab"> this is from products</div>
            <div id="account" class="sub-tab">this is from account</div>
        </div>
    </div>
    <!-- End of dashboard -->

    <script src="./admin.js"></script>
