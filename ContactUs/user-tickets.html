<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8" />
    <title>My Tickts</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap"
        rel="stylesheet">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="../Components/Style.css">
    <link rel="stylesheet" href="CSS/style.css">
</head>
<body>

        <div id="navbar"></div>

        <div class="container mt-5">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2>My Support Tickets</h2>
                <a href="../ContactUs/Contact.html" class="btn btn-outline-dark">
                    + New Message
                </a>
            </div>

            <div id="ticketsContainer" class="row g-3">
                <!-- Tickets will be rendered here -->
            </div>
        </div>

        <div id="footer"></div>
        


    <!-- Toast (Top Right) -->
            <div class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 9999;">
                
                <div id="mainToast" class="toast align-items-center text-white border-0" role="alert">
                    <div class="d-flex">
                        <div class="toast-body" id="toastMessage">
                            Message here
                        </div>
                        <button type="button" class="btn-close btn-close-white me-2 m-auto"
                            data-bs-dismiss="toast"></button>
                    </div>
                </div>

            </div>

    <!-- Bootstrap JS -->
    <script src="../GeneralFunctions/showToast.js"></script>

    <!-- Bootstrap JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.8/js/bootstrap.bundle.min.js"></script>

    <!-- Load Components -->
    <script src="../Components/loadCompnent.js"></script>
    <script src="JS/users-tickets.js"></script>

</body>
</html>
