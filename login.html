<!DOCTYPE html>

<html>

<head>
    <title>Login</title>
    <link rel="stylesheet" href="">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="https://kit.fontawesome.com/08a50da474.js" crossorigin="anonymous"></script>
    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(to bottom, #2A254B, #1a162e);
            /* background: linear-gradient(to bottom, #2A254B, #1a162e),
                url('./login_bg.jpeg'); */
            background-size: cover;
            background-position: center;
            background-blend-mode: overlay;
        }

        .glass {
            /* background: rgba(255, 255, 255, 0.15); */
            background: rgba(255, 255, 255, 0.845);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            /* border: 1px solid rgba(255, 255, 255, 0.3); */
            border: 1px solid rgba(255, 255, 255, 0.628);
        }

        .user-role {
            border: 2px solid #2A254B;
            border-radius: 10px;
            padding: 5px;
            cursor: pointer;
            transition: all 200ms ease-in-out;
        }

        .active-user-role,
        .user-role:hover {
            background-color: #2A254B;
            color: aliceblue;
            box-shadow: 1px 1px 10px rgba(0, 0, 0, 0.635);
        }

        button {
            background-color: #2A254B;
            color: aliceblue;
            padding: 6px 25px;
            border-radius: 10px;
            width: 100%;
            cursor: pointer;
            letter-spacing: 3px;
            box-shadow: 1px 1px 10px rgba(0, 0, 0, 0.635);
        }

        .main-row {

            animation-name: fade-up;
            animation-duration: 1s;
            animation-timing-function: ease-out;
            animation-iteration-count: 1;
        }

        @keyframes fade-up {
            from {
                opacity: 0;
                transform: translateY(-100%);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>

</head>

<body class="d-flex justify-content-center align-items-center w-100">
    <!-- <div class="container-fluid p-0"> -->
    <div class="row p-0 m-auto text-center main-row" style="max-width: 900px;">
        <div class="col-12 col-md-6 text-light  p-0">
            <img src="./imgs/login_bg.jpeg" class="w-100 rounded-start-5">
            <!-- <h2 class="">
                    wellcome
                </h2> -->
            <!-- <p class="text-start">Get <br>Everything <br>You want</p> -->
        </div>
        <div class="col-12 col-md-6 p-5 glass rounded-end-5">
            <p class="h2">Login</p>
            <p class="text-secondary mb-0"><i>Wellcome back!</i></p>
            <form class="form-group row text-start">
                <div class="col-12">
                    <div class="row text-center">
                        <div class="col-12 col-sm-6 p-3">
                            <p class="user-role position-relative">
                                <img src="./imgs/seller_black.png" class="position-absolute top-0 start-0 mt-1 ms-2"
                                    style="width: 25px;" alt="">
                                Seller
                            </p>
                        </div>
                        <div class="col-12 col-sm-6 p-3">
                            <p class="user-role position-relative">
                                <img src="./imgs/customer_black.png" class="position-absolute top-0 start-0 mt-1 ms-2 "
                                    style="width: 25px;" alt="">
                                <span class="ms-3">Customer</span>
                            </p>
                        </div>
                    </div>
                </div>
                <div class="col-12 mb-3">
                    <p>Email</p>
                    <input type="email" class="form-control">
                </div>
                <div class="col-12">
                    <p>Password</p>
                    <input type="password" class="form-control">
                </div>
                <div class="col-12 text-center mt-3">
                    <p class="text-secondary" style="font-size: 0.8rem;"> new here? <a href="login.html" class="fw-bold"
                            style="color: #2A254B; font-style: italic;">sign-up</a> now and
                        power up your
                        digital lifestyle</p>
                    <button>Login</button>
                </div>
            </form>
        </div>
    </div>
    <!-- </div> -->
</body>

<script src=""></script>

</html>
