<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <title>Document</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: sans-serif;
        }

        #mainwrapper {
            display: grid;
            grid-template-columns: 240px 1fr;
            grid-template-areas: "sidebar main";
            min-height: 100vh;
            background-color: #f4f7fe;
        }


        #sidebar {
            grid-area: sidebar;
            background-color: #1b254b;
            color: #a3b1cc;
            padding: 20px;
        }

        #sidebar ul {
            list-style: none;
            margin-top: 30px;
        }

        #sidebar li {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 5px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #sidebar li:hover {
            background-color: #ffffff22;
            color: white;
        }



        #main {
            grid-area: main;
            padding: 20px;
        }

        svg {
            width: 30px;
            height: 30px;
            fill: #a3b1cc;
            transition: 0.3s;

        }

        #sidebar li:hover svg {
            fill: #ffffff;
        }

        .active {
            background-color: #ffffff22;
            color: #a3b1cc;
        }

        .dashboard {
            display: grid;
            grid-template-columns: 2fr 1fr;
            grid-template-areas: "cards chart"
                "products sidebox";
            gap: 20px;

        }

        .cards {
            grid-area: cards;
            padding: 20px;

        }

        .chart {
            grid-area: chart;
            background-color: #ffffff;
        }

        .products {
            grid-area: products;
            background-color: #ffffff;
        }

        .sidebox {
            grid-area: sidebox;
            background-color: #ffffff;
            border-radius: 20px;
        }

        .CBOX {
            display: grid;
            grid-template-areas: "TOTAL NEW PENDING";
        }

        .TOTAL {
            grid-area: TOTAL;
            width: 250px;
            height: 100px;
            text-align: center;
            color: #1b254b;
            border-radius: 20px;
            background-color: lightblue;
            align-items: center;
            display: flex;
            justify-content: center;
        }

        .NEW {
            grid-area: NEW;
            width: 250px;
            height: 100px;
            text-align: center;
            color: #1b254b;
            border-radius: 20px;
            background-color: lightgreen;
            align-items: center;
            display: flex;
            justify-content: center;
        }

        .PENDING {
            grid-area: PENDING;
            width: 250px;
            height: 100px;
            text-align: center;
            color: #1b254b;
            border-radius: 20px;
            background-color: lightsalmon;
            align-items: center;
            display: flex;
            justify-content: center;
        }
    </style>
</head>

            </ul>
        </aside>
        <section id="main">
            <div class="dashboard">
                <div class="cards">
                    <div class="CBOX">
                        <div class="TOTAL">TOTAL SALES</div>
                        <div class="NEW">NEW ORDERS</div>
                        <div class="PENDING">PENDING SHIPMENTS</div>
                    </div>
                </div>
                <div class="chart">
                    <div class="card p-3">
                        <canvas id="myChart"></canvas>
                    </div>
                </div>
                <div class="products">Products</div>
                <div class="sidebox">Side Box</div>
            </div>
        </section>
    </section>
    <script>
        const ctx = document.getElementById('myChart');

        new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May'],
                datasets: [{
                    label: 'Revenue',
                    data: [10, 20, 15, 30, 40],
                    borderWidth: 2
                }]
            }
        });
    </script>

</body>

</html>
